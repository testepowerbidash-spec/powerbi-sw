<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreamento de Balsas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<!-- SheetJS para importação de Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0f172a; font-family: Arial, sans-serif; overflow: hidden; }
  #map { width: 100%; height: 100%; background: #111827; }

  /* Legenda */
  .map-legend {
    position: absolute; bottom: 28px; left: 10px; z-index: 1000;
    background: rgba(15,23,42,.92); border: 1px solid #334155;
    border-radius: 6px; padding: 7px 10px; font-size: 10px; color: #94a3b8; pointer-events: none;
  }
  .li { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Botão de importação */
  .import-btn {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: #1d4ed8; color: #e2e8f0; border: none; border-radius: 6px;
    padding: 8px 14px; font-size: 12px; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.4);
    transition: background .15s;
  }
  .import-btn:hover { background: #2563eb; }
  .save-btn { background: #15803d; }
  .save-btn:hover { background: #16a34a; }
  .save-btn:disabled { cursor: default; opacity: .85; }

  /* Botão de modo edição/travar */
  .lock-btn {
    position: absolute; top: 10px; right: 168px; z-index: 1000;
    color: #e2e8f0; border: none; border-radius: 6px;
    padding: 8px 14px; font-size: 12px; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.4);
    transition: background .15s;
  }
  .lock-btn.locked { background: #334155; }
  .lock-btn.locked:hover { background: #475569; }
  .lock-btn.unlocked { background: #b45309; }
  .lock-btn.unlocked:hover { background: #d97706; }
  .edit-mode-banner {
    position: absolute; top: 50px; right: 10px; z-index: 999;
    background: rgba(180,83,9,.92); color: #fef3c7; font-size: 10px;
    padding: 5px 10px; border-radius: 5px; display: none; font-weight: bold;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .edit-mode-banner.visible { display: block; }
  /* No modo travado (visualização), ícones/cards não devem indicar arraste */
  body:not(.edit-mode) .ferry-mini-card { cursor: default; }
  body:not(.edit-mode) .leaflet-marker-draggable { cursor: default !important; }

  /* Modal de importação */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 9000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1e293b; border: 1px solid #334155; border-radius: 10px;
    padding: 24px; width: 520px; max-width: 95vw; color: #e2e8f0;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .modal h2 { font-size: 15px; font-weight: bold; color: #f1f5f9; margin-bottom: 16px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
  .drop-zone {
    border: 2px dashed #334155; border-radius: 8px; padding: 28px 20px;
    text-align: center; color: #64748b; font-size: 12px; cursor: pointer;
    transition: border-color .15s, background .15s; margin-bottom: 14px;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #3b82f6; background: rgba(59,130,246,.06); color: #93c5fd; }
  .drop-zone input { display: none; }
  .drop-zone .icon { font-size: 28px; margin-bottom: 8px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .modal-btn { padding: 8px 18px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
  .modal-btn-cancel { background: #334155; color: #94a3b8; }
  .modal-btn-cancel:hover { background: #475569; }
  .modal-btn-confirm { background: #15803d; color: #e2e8f0; }
  .modal-btn-confirm:hover { background: #16a34a; }
  .modal-btn-confirm:disabled { background: #334155; color: #475569; cursor: not-allowed; }
  .preview-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; max-height: 160px; overflow-y: auto; display: block; }
  .preview-table th { background: #0f172a; color: #64748b; padding: 5px 8px; text-align: left; position: sticky; top: 0; }
  .preview-table td { padding: 4px 8px; border-top: 1px solid #1e293b; color: #e2e8f0; }
  .preview-table tr:nth-child(even) td { background: rgba(255,255,255,.03); }
  .col-map { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
  .col-map-row { display: flex; flex-direction: column; gap: 4px; }
  .col-map-row label { font-size: 10px; color: #64748b; }
  .col-map-row select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 4px; padding: 5px 8px; font-size: 11px; }
  .import-status { font-size: 11px; color: #64748b; margin-top: 6px; min-height: 18px; }
  .import-status.ok { color: #86efac; }
  .import-status.err { color: #fca5a5; }

  /* Card flutuante de info/edição */
  .ferry-card {
    position: absolute; z-index: 2000; width: 210px;
    background: rgba(15,23,42,0.97); border: 1px solid #334155;
    border-radius: 8px; padding: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.7);
    pointer-events: auto; display: none;
  }
  .ferry-card.visible { display: block; }
  .ferry-card-title {
    font-size: 12px; font-weight: bold; margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 1px solid #334155;
    display: flex; align-items: center; justify-content: space-between;
  }
  .ferry-card-close {
    background: none; border: none; color: #64748b; cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0;
  }
  .ferry-card-close:hover { color: #e2e8f0; }
  .fc-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; font-size: 10px; color: #64748b; }
  .fc-row .fc-val { color: #e2e8f0; font-weight: bold; margin-left: auto; text-align: right; max-width: 120px; }
  .fc-input {
    margin-left: auto; background: #0f172a; border: 1px solid #334155;
    color: #e2e8f0; border-radius: 4px; padding: 2px 5px; font-size: 10px;
    text-align: right; width: 105px;
  }
  .fc-input:focus { outline: none; border-color: #3b82f6; }
  .badge { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .badge-late  { background: #7f1d1d; color: #fca5a5; }
  .badge-early { background: #14532d; color: #86efac; }
  .badge-ok    { background: #1e3a5f; color: #93c5fd; }
  .pbar { width: 100%; height: 4px; background: #334155; border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .pfill { height: 100%; border-radius: 2px; }
  .fc-edit-btn {
    display: block; width: 100%; margin-top: 10px; padding: 7px 0;
    border-radius: 5px; border: none; cursor: pointer; font-size: 11px;
    font-weight: bold; transition: background .15s;
  }
  .fc-btn-edit { background: #1d4ed8; color: #e2e8f0; }
  .fc-btn-edit:hover { background: #2563eb; }
  .fc-btn-save { background: #15803d; color: #e2e8f0; }
  .fc-btn-save:hover { background: #16a34a; }
  .fc-btn-cancel { background: #7f1d1d; color: #fca5a5; margin-top: 4px; }
  .fc-btn-cancel:hover { background: #991b1b; }
  .fc-edit-hint { font-size: 9px; color: #475569; text-align: center; margin-top: 5px; }

  /* Mini-card flutuante (arrastável) ligado ao ícone da balsa */
  .ferry-mini-card {
    position: absolute; z-index: 1400; cursor: grab; user-select: none;
    background: rgba(15,23,42,0.95); border-radius: 6px; min-width: 118px;
    box-shadow: 0 4px 16px rgba(0,0,0,.7); font-family: Arial, sans-serif;
    padding: 5px 6px 5px; touch-action: none;
  }
  .ferry-mini-card.dragging { cursor: grabbing; opacity: .85; z-index: 2600; }
  .fmc-head { font-size:10px; font-weight:bold; margin-bottom:4px; padding-bottom:3px; border-bottom:1px solid #334155; white-space:normal; word-break:break-word; line-height:1.25; padding-left:14px; padding-right:14px; text-align:center; }
  .fmc-row { display:flex; justify-content:space-between; font-size:8px; margin-bottom:2px; color:#64748b; gap:5px; }
  .fmc-row span:last-child { color:#e2e8f0; font-weight:bold; }
  .fmc-row strong { color:#e2e8f0; }
  .fmc-edit-btn {
    position:absolute; top:3px; right:3px; background:rgba(255,255,255,.08); border:none; color:#94a3b8;
    border-radius:4px; width:15px; height:15px; font-size:9px; line-height:15px; text-align:center; cursor:pointer; padding:0;
  }
  .fmc-edit-btn:hover { background:rgba(255,255,255,.18); color:#e2e8f0; }
  .leaflet-marker-draggable { cursor: grab !important; }
  .leaflet-marker-draggable:active, .marker-dragging { cursor: grabbing !important; }

  /* Leaflet overrides */
  .leaflet-tooltip { background: none !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
  .leaflet-tooltip-top::before, .leaflet-tooltip-bottom::before { display: none !important; }
  .city-label { pointer-events: none; }
  .leaflet-container { background: #111827; }
  .leaflet-control-attribution { background: rgba(15,23,42,0.8) !important; color: #475569 !important; }
  .leaflet-control-attribution a { color: #64748b !important; }
  .leaflet-control-zoom { border: 1px solid #334155 !important; }
  .leaflet-control-zoom a { background: #1e293b !important; color: #94a3b8 !important; border-bottom: 1px solid #334155 !important; }
  .leaflet-control-zoom a:hover { background: #293548 !important; color: #f1f5f9 !important; }
  .leaflet-popup-content-wrapper { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
  .leaflet-popup-tip { background: #1e293b; }
</style>
</head>
<body>

<div id="map"></div>

<!-- Legenda -->
<div class="map-legend">
  <div class="li"><div class="ld" style="background:#ef4444"></div><span>Atrasado</span></div>
  <div class="li"><div class="ld" style="background:#22c55e"></div><span>Adiantado</span></div>
  <div class="li"><div class="ld" style="background:#3b82f6"></div><span>No Prazo</span></div>
</div>

<!-- Botão importar -->
<button class="import-btn" onclick="openImportModal()">
  📥 Importar Planilha
</button>

<!-- Botão de travar/destravar edição de posições -->
<button class="lock-btn locked" id="lockBtn" onclick="toggleEditMode()">
  🔒 Travado
</button>
<button class="import-btn save-btn" id="saveBtn" style="right:336px" onclick="manualSave()">
  💾 Salvar
</button>
<div class="edit-mode-banner" id="editModeBanner">✏️ Modo edição ativo — arraste balsas e cards para reposicionar</div>

<!-- Card flutuante (info + edição) -->
<div class="ferry-card" id="ferryCard">
  <div class="ferry-card-title">
    <span id="fc-title">⛴ Balsa</span>
    <button class="ferry-card-close" onclick="closeCard()">×</button>
  </div>
  <div id="fc-body"></div>
</div>

<!-- Modal de importação -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h2>📥 Importar dados de planilha</h2>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="handleFile(event)">
      <div class="icon">📊</div>
      <div>Arraste um arquivo Excel (.xlsx, .xls) ou CSV aqui</div>
      <div style="margin-top:6px;font-size:10px">ou clique para selecionar</div>
    </div>
    <div class="import-status" id="importStatus"></div>

    <!-- Mapeamento de colunas (aparece após carregar arquivo) -->
    <div id="colMapSection" style="display:none">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:8px;font-weight:bold">Mapeamento de colunas</div>
      <div class="col-map" id="colMapGrid"></div>
    </div>

    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeImportModal()">Cancelar</button>
      <button class="modal-btn modal-btn-confirm" id="confirmImportBtn" disabled onclick="applyImport()">Aplicar dados</button>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

function saveDataToStorage() {
  try {
    localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(BALSAS_DATA));
    return true;
  } catch(e) { return false; }
}

function manualSave() {
  var btn = document.getElementById('saveBtn');
  var ok = saveDataToStorage();
  if(!btn) return;
  var original = btn.innerHTML;
  btn.innerHTML = ok ? '✅ Salvo!' : '⚠️ Erro ao salvar';
  btn.disabled = true;
  setTimeout(function(){ btn.innerHTML = original; btn.disabled = false; }, 1500);
}

function dist2d(a, b) { var dx=a[0]-b[0],dy=a[1]-b[1]; return Math.sqrt(dx*dx+dy*dy); }
function getPosAtPct(pct) {
  var total=0;
  for(var i=0;i<ROUTE_LONLAT.length-1;i++) total+=dist2d(ROUTE_LONLAT[i],ROUTE_LONLAT[i+1]);
  var target=pct*total,acc=0;
  for(var i=0;i<ROUTE_LONLAT.length-1;i++){
    var d=dist2d(ROUTE_LONLAT[i],ROUTE_LONLAT[i+1]);
    if(acc+d>=target){ var t=(target-acc)/d; return [ROUTE_LONLAT[i][1]+t*(ROUTE_LONLAT[i+1][1]-ROUTE_LONLAT[i][1]), ROUTE_LONLAT[i][0]+t*(ROUTE_LONLAT[i+1][0]-ROUTE_LONLAT[i][0])]; }
    acc+=d;
  }
  return [ROUTE_LONLAT[ROUTE_LONLAT.length-1][1], ROUTE_LONLAT[ROUTE_LONLAT.length-1][0]];
}

function makeFerryIcon(color, isSelected) {
  var W=48, H=32;
  var shadow = isSelected ? 'drop-shadow(0 0 6px '+color+')' : 'none';
  var html =
    '<div style="position:relative;width:'+W+'px;filter:'+shadow+'">'+
      '<img src="'+FERRY_ICON_B64+'" width="'+W+'" height="'+H+'" style="display:block;"/>'+
    '</div>';
  return L.divIcon({ className:'', html:html, iconSize:[W, H], iconAnchor:[W/2, H/2] });
}

// ============================================================
// MARCADORES + LINHA CONECTORA + CARD
// ============================================================
var markers = [];
var miniCards = []; // divs arrastáveis (substituem o antigo tooltip fixo)
var connectorLines = []; // SVG lines overlay
var current = -1;
var manualOffsets = []; // mantido por compat, não usado mais para posição

// ============================================================
// MODO EDIÇÃO (travar/destravar arraste de balsas e cards)
// Por padrão fica TRAVADO: o usuário final pode dar pan/zoom no mapa
// livremente sem o risco de arrastar sem querer um ícone ou card.
// ============================================================
var EDIT_MODE_KEY = 'balsaEditModeOn';
var editMode = (function(){ try { return localStorage.getItem(EDIT_MODE_KEY) === '1'; } catch(e){ return false; } })();

function applyEditModeUI() {
  var btn = document.getElementById('lockBtn');
  var banner = document.getElementById('editModeBanner');
  if(editMode) {
    document.body.classList.add('edit-mode');
    btn.classList.remove('locked'); btn.classList.add('unlocked');
    btn.innerHTML = '🔓 Modo Edição';
    banner.classList.add('visible');
  } else {
    document.body.classList.remove('edit-mode');
    btn.classList.remove('unlocked'); btn.classList.add('locked');
    btn.innerHTML = '🔒 Travado';
    banner.classList.remove('visible');
  }
  // Liga/desliga o drag de cada marcador conforme o modo
  markers.forEach(function(m){
    if(!m || !m.dragging) return;
    if(editMode) m.dragging.enable(); else m.dragging.disable();
  });
}

function toggleEditMode() {
  editMode = !editMode;
  try { localStorage.setItem(EDIT_MODE_KEY, editMode ? '1' : '0'); } catch(e){}
  applyEditModeUI();
}

// Overlay SVG para linhas conectoras
var svgLayer = null;

function getMapPoint(lat, lng) {
  return map.latLngToLayerPoint(L.latLng(lat, lng));
}

// ============================================================
// OFFSETS DOS MINI-CARDS (posição manual, persistida por balsa)
// ============================================================
var TT_STORAGE_KEY = 'balsaTooltipOffsets_v1';
function loadTTOffsets() {
  try { return JSON.parse(localStorage.getItem(TT_STORAGE_KEY)) || {}; } catch(e){ return {}; }
}
function saveTTOffsets() {
  try { localStorage.setItem(TT_STORAGE_KEY, JSON.stringify(ttOffsets)); } catch(e){}
}
var ttOffsets = loadTTOffsets();
function balsaKey(d) { return ((d.balsa||'')+'|'+(d.carreteira||'')).trim().toLowerCase().replace(/\s+/g,' '); }
function getTTOffset(d, i) {
  var k = balsaKey(d);
  if(ttOffsets[k]) return ttOffsets[k];
  // Padrão: alterna acima/abaixo do ícone para balsas novas
  return (i % 2 === 0) ? { dx: -95, dy: -132 } : { dx: -95, dy: 24 };
}
function setTTOffset(d, off) {
  ttOffsets[balsaKey(d)] = off;
  saveTTOffsets();
}

// ============================================================
// OFFSETS DE POSIÇÃO DO ÍCONE (persistido por balsa, sobrevive a importações)
// ============================================================
var POS_STORAGE_KEY = 'balsaMarkerOffsets_v1';
function loadPosOffsets() {
  try { return JSON.parse(localStorage.getItem(POS_STORAGE_KEY)) || {}; } catch(e){ return {}; }
}
function savePosOffsets() {
  try { localStorage.setItem(POS_STORAGE_KEY, JSON.stringify(posOffsets)); } catch(e){}
}
var posOffsets = loadPosOffsets();
function getPosOffset(d) {
  var k = balsaKey(d);
  return posOffsets[k] || [0, 0];
}
function setPosOffset(d, off) {
  posOffsets[balsaKey(d)] = off;
  savePosOffsets();
}
function clearPosOffset(d) {
  delete posOffsets[balsaKey(d)];
  savePosOffsets();
}

var ttSvg = null;
function ensureTTSvg() {
  if(ttSvg && ttSvg.parentNode) return ttSvg;
  var mapDiv = document.getElementById('map');
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'tt-connectors-svg';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1300;overflow:visible';
  mapDiv.appendChild(svg);
  ttSvg = svg;
  return svg;
}

function positionMiniCard(i) {
  var card = miniCards[i];
  var m = markers[i];
  if(!card || !m) return;
  var pt = map.latLngToContainerPoint(m.getLatLng());
  var off = card._offset;
  card.style.left = (pt.x + off.dx) + 'px';
  card.style.top = (pt.y + off.dy) + 'px';
  updateTTConnector(i);
}

function updateTTConnector(i) {
  var svg = ensureTTSvg();
  var card = miniCards[i];
  var m = markers[i];
  if(!card || !m) return;
  var mapDiv = document.getElementById('map');
  var mapRect = mapDiv.getBoundingClientRect();
  var cardRect = card.getBoundingClientRect();
  var pt = map.latLngToContainerPoint(m.getLatLng());
  var cx = cardRect.left - mapRect.left + cardRect.width / 2;
  var cy = cardRect.top - mapRect.top + cardRect.height / 2;
  var d = BALSAS_DATA[i];
  var color = d ? statusColor(d.sit) : '#3b82f6';
  var line = svg.querySelector('#tt-line-'+i);
  if(!line) {
    line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.id = 'tt-line-'+i;
    line.setAttribute('stroke-dasharray', '2,5');
    svg.appendChild(line);
  }
  line.setAttribute('x1', pt.x); line.setAttribute('y1', pt.y);
  line.setAttribute('x2', cx); line.setAttribute('y2', cy);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '2.5');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('opacity', '.95');
  line.style.filter = 'drop-shadow(0 0 3px ' + color + ')';
}

function repositionAllMiniCards() {
  miniCards.forEach(function(c, i){ if(c) positionMiniCard(i); });
}

function makeMiniCardDraggable(card, i) {
  var dragging = false, startX, startY, startOff;
  card.addEventListener('pointerdown', function(e){
    if(!editMode) return;
    if(e.target.closest && e.target.closest('.fmc-edit-btn')) return;
    dragging = true;
    card.classList.add('dragging');
    startX = e.clientX; startY = e.clientY;
    startOff = { dx: card._offset.dx, dy: card._offset.dy };
    if(card.setPointerCapture) { try{ card.setPointerCapture(e.pointerId); }catch(err){} }
    e.preventDefault();
  });
  card.addEventListener('pointermove', function(e){
    if(!dragging) return;
    var dx = e.clientX - startX, dy = e.clientY - startY;
    card._offset = { dx: startOff.dx + dx, dy: startOff.dy + dy };
    positionMiniCard(i);
  });
  function endDrag(){
    if(!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    setTTOffset(BALSAS_DATA[i], card._offset);
  }
  card.addEventListener('pointerup', endDrag);
  card.addEventListener('pointercancel', endDrag);
}

function buildMarkers() {
  markers.forEach(function(m){ if(m) map.removeLayer(m); });
  miniCards.forEach(function(c){ if(c && c.parentNode) c.parentNode.removeChild(c); });
  if(ttSvg) ttSvg.innerHTML = '';
  markers = []; miniCards = [];

  BALSAS_DATA.forEach(function(d, i) {
    var pct = d.pct / 100;
    var pos = getPosAtPct(pct);
    var lat = pos[0] + getPosOffset(d)[0];
    var lng = pos[1] + getPosOffset(d)[1];
    var color = statusColor(d.sit);
    var isSelected = (i === current);

    var icon = makeFerryIcon(color, isSelected);
    var marker = L.marker([lat, lng], {
      icon: icon,
      zIndexOffset: isSelected ? 1000 : 0,
      draggable: editMode,
      autoPan: true
    }).addTo(map);

    var nomeFinal = (d.carreteira && d.carreteira !== '') ? d.balsa + '<br><span style="font-size:8px;opacity:.75">/ '+d.carreteira+'</span>' : d.balsa;

    // Mini-card arrastável (substitui o antigo tooltip fixo) - SEM progresso, NÃO abre ao clicar no ícone
    var card = document.createElement('div');
    card.className = 'ferry-mini-card';
    card.style.borderLeft = '3px solid ' + color;
    card.innerHTML =
      '<button class="fmc-edit-btn" title="Editar dados">✏️</button>'+
      '<div class="fmc-head" style="color:'+color+'">⛴ '+nomeFinal+'</div>'+
      '<div class="fmc-row"><span>⚓ Emp.</span><span>'+escH(d.emp)+'</span></div>'+
      '<div class="fmc-row"><span>⬆️ Sent.</span><span>'+escH(d.sentido)+'</span></div>'+
      '<div class="fmc-row"><span>🚦 Início</span><span>'+escH(abrevData(d.saida))+'</span></div>'+
      '<div class="fmc-row"><span>📋 Plano</span><span>'+escH(abrevData(d.prev))+'</span></div>'+
      '<div class="fmc-row"><span>✅ Real</span><span>'+escH(abrevData(d.real)||'-')+'</span></div>'+
      '<div class="fmc-row"><span>⏳ Hr Nav.</span><span>'+escH(d.horasNav||'0:00')+'</span></div>'+
      '<div class="fmc-row" style="align-items:center"><span>'+statusIcon(d.sit)+' Sit.</span><span style="font-size:8px;font-weight:bold;padding:1px 6px;border-radius:10px;'+(d.sit==='Atrasado'?'background:#7f1d1d;color:#fca5a5':d.sit==='Adiantado'?'background:#14532d;color:#86efac':'background:#1e3a5f;color:#93c5fd')+'">'+d.sit+' '+d.hrs+'</span></div>'+
      '<div class="fmc-row" style="margin-bottom:0"><span>Racks: <strong>'+d.racks+'</strong></span><span>Merc: <strong>'+d.merc+'</strong></span></div>'+
      '<div class="fmc-row" style="margin-bottom:0"><span>tCargas: <strong>'+(d.racks+d.merc)+'</strong></span></div>';

    card._offset = getTTOffset(d, i);
    card.querySelector('.fmc-edit-btn').addEventListener('click', function(ev){
      ev.stopPropagation();
      openCard(i);
    });
    document.getElementById('map').appendChild(card);
    makeMiniCardDraggable(card, i);

    // O ícone da balsa é sempre arrastável no mapa. O mini-card (e o card grande,
    // se estiver aberto) seguem o ícone automaticamente, "linkados" pela linha conectora.
    marker.on('dragstart', function(){
      marker.getElement() && marker.getElement().classList.add('marker-dragging');
    });
    marker.on('drag', function(e){
      var ll = e.target.getLatLng();
      positionMiniCard(i);
      if(cardVisible && current === i) updateConnectorLine(i);
    });
    marker.on('dragend', function(e){
      var ll = e.target.getLatLng();
      var basePos = getPosAtPct(BALSAS_DATA[i].pct / 100);
      setPosOffset(BALSAS_DATA[i], [ll.lat - basePos[0], ll.lng - basePos[1]]);
      positionMiniCard(i);
      if(cardVisible && current === i) updateConnectorLine(i);
    });

    markers.push(marker);
    miniCards.push(card);
  });

  repositionAllMiniCards();
  applyEditModeUI();
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function abrevData(s){
  if(!s) return s;
  var m = String(s).match(/^(\d{1,2})\/(\d{1,2})\/\d{2,4}(\s+\d{1,2}:\d{2})?$/);
  if(!m) return s;
  return m[1]+'/'+m[2]+(m[3]||'');
}

function positionCard(i) {
  var card = document.getElementById('ferryCard');
  var m = markers[i];
  if(!m) return;
  var pt = map.latLngToContainerPoint(m.getLatLng());
  var mapDiv = document.getElementById('map');
  var W = mapDiv.offsetWidth, H = mapDiv.offsetHeight;
  var cW = 220, cH = 320;
  var x = pt.x + 30;
  var y = pt.y - 80;
  if(x + cW > W - 10) x = pt.x - cW - 30;
  if(y < 10) y = 10;
  if(y + cH > H - 10) y = H - cH - 10;
  card.style.left = x + 'px';
  card.style.top = y + 'px';
}

  renderCard(i, true);
}

function cancelCardEdit(i) {
  renderCard(i, false);
}

function saveCardEdit(i) {
  var d = BALSAS_DATA[i];
  d.emp = document.getElementById('ed-emp').value;
  d.viagem = document.getElementById('ed-viagem').value;
  d.sentido = document.getElementById('ed-sentido').value;
  d.saida = document.getElementById('ed-saida').value;
  d.prev = document.getElementById('ed-prev').value;
  d.real = document.getElementById('ed-real').value;
  d.horasNav = document.getElementById('ed-horasNav').value;
  d.sit = document.getElementById('ed-sit').value;
  d.hrs = document.getElementById('ed-hrs').value;
  d.racks = parseInt(document.getElementById('ed-racks').value) || 0;
  d.merc = parseInt(document.getElementById('ed-merc').value) || 0;
  var newPct = parseFloat(document.getElementById('ed-pct').value);
  if(!isNaN(newPct)) {
    d.pct = Math.max(0, Math.min(100, newPct));
    clearPosOffset(d);
  }
  buildMarkers();
  renderCard(i, false);
  drawConnectorLine(i);
  saveDataToStorage();
}

// Converte número serial de data do Excel (ex: 46192.4375) para "dd/mm/aaaa hh:mm".
// Se o valor não for um número serial plausível, retorna o texto original sem alterar.
function excelSerialToDateStr(val) {
  var n = parseFloat(val);
  if(isNaN(n) || !/^-?\d+(\.\d+)?$/.test(String(val).trim())) return val;
  // Faixa plausível de datas (anos ~1950 a ~2100) no sistema de serial do Excel
  if(n < 18000 || n > 73000) return val;
  var utcDays = Math.floor(n - 25569);
  var utcMs = utcDays * 86400 * 1000;
  var date = new Date(utcMs);
  var fraction = n - Math.floor(n);
  var totalSeconds = Math.round(fraction * 86400);
  var hh = Math.floor(totalSeconds / 3600);
  var mm = Math.floor((totalSeconds % 3600) / 60);
  function pad(x){ return String(x).padStart(2,'0'); }
  return pad(date.getUTCDate())+'/'+pad(date.getUTCMonth()+1)+' '+pad(hh)+':'+pad(mm);
}

var dz = document.getElementById('dropZone');
dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', function(){ dz.classList.remove('drag-over'); });
dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('drag-over'); var f=e.dataTransfer.files[0]; if(f) processFile(f); });

function processFile(file) {
  var st = document.getElementById('importStatus');
  st.className = 'import-status';
  st.textContent = 'Lendo arquivo...';
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: 'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if(rows.length < 2) { st.className='import-status err'; st.textContent='Arquivo vazio ou sem dados.'; return; }
      sheetHeaders = rows[0].map(function(h){ return String(h); });
      importedRows = rows.slice(1).filter(function(r){ return r.some(function(c){ return c !== ''; }); });
      st.className='import-status ok';
      st.textContent = 'Arquivo carregado: ' + importedRows.length + ' linha(s). Mapeie as colunas abaixo.';
      buildColMapUI();
    } catch(err) {
      st.className='import-status err';
      st.textContent = 'Erro ao ler arquivo: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

function buildColMapUI() {
  var grid = document.getElementById('colMapGrid');
  var opts = '<option value="">-- ignorar --</option>' +
    sheetHeaders.map(function(h,i){ return '<option value="'+i+'">'+escH(h)+'</option>'; }).join('');
  
  grid.innerHTML = FIELD_LABELS.map(function(f) {
    // Auto-match por nome similar
    var autoIdx = '';
    for(var i=0;i<sheetHeaders.length;i++){
      var h = sheetHeaders[i].toLowerCase().trim();
      if(h.indexOf(f.key) >= 0 || f.key.indexOf(h) >= 0 ||
         (f.key==='balsa' && (h.indexOf('balsa')>=0||h.indexOf('vessel')>=0)) ||
         (f.key==='emp' && (h.indexOf('empurr')>=0||h.indexOf('push')>=0)) ||
         (f.key==='sit' && (h.indexOf('situa')>=0||h.indexOf('status')>=0)) ||
         (f.key==='pct' && (h.indexOf('posi')>=0||h.indexOf('percent')>=0||h.indexOf('%')>=0)) ||
         (f.key==='horasNav' && (h.indexOf('navegad')>=0||h.indexOf('navegada')>=0))
        ) { autoIdx = i; break; }
    }
    return '<div class="col-map-row"><label>'+escH(f.label)+'</label>'+
      '<select id="cm-'+f.key+'">'+opts.replace('value="'+autoIdx+'"', 'value="'+autoIdx+'" selected')+'</select></div>';
  }).join('');

  document.getElementById('colMapSection').style.display = 'block';
  document.getElementById('confirmImportBtn').disabled = false;
}

function applyImport() {
  if(!importedRows) return;
  var mapping = {};
  FIELD_LABELS.forEach(function(f){ var s=document.getElementById('cm-'+f.key); mapping[f.key] = s ? s.value : ''; });

  function getVal(row, key) {
    var idx = mapping[key];
    if(idx === '' || idx === undefined) return '';
    return row[parseInt(idx)] !== undefined ? String(row[parseInt(idx)]) : '';
  }

  var newData = importedRows.map(function(row) {
    return {
      balsa:      getVal(row,'balsa') || '---',
      carreteira: getVal(row,'carreteira'),
      emp:        getVal(row,'emp'),
      viagem:     getVal(row,'viagem'),
      sentido:    getVal(row,'sentido'),
      saida:      excelSerialToDateStr(getVal(row,'saida')),
      prev:       excelSerialToDateStr(getVal(row,'prev')),
      real:       excelSerialToDateStr(getVal(row,'real')),
      sit:        getVal(row,'sit') || 'No prazo',
      hrs:        getVal(row,'hrs') || '0:00',
      horasNav:   getVal(row,'horasNav') || '0:00',
      racks:      parseInt(getVal(row,'racks')) || 0,
      merc:       parseInt(getVal(row,'merc')) || 0,
      cargas:     parseInt(getVal(row,'cargas')) || 0,
      pct:        parseFloat(getVal(row,'pct')) || 0
    };
  });

  // Normaliza situação
  newData.forEach(function(d){
    var s = d.sit.toLowerCase();
    if(s.indexOf('atras')>=0) d.sit='Atrasado';
    else if(s.indexOf('adiant')>=0) d.sit='Adiantado';
    else d.sit='No prazo';
  });

  BALSAS_DATA = newData;
  // Posições dos ícones são preservadas automaticamente (chave = balsa+carreteira),
  // não há mais necessidade de resetar/expandir offsets aqui.
  saveDataToStorage();

  closeCard();
  buildMarkers();
  closeImportModal();
  var st = document.getElementById('importStatus');
  st.className='import-status ok';
  st.textContent = newData.length + ' balsas importadas!';
}

// ============================================================
// INIT
// ============================================================
buildMarkers();

// Reagir a redimensionamentos do contêiner (essencial em embeds como Power BI,
// onde o tamanho do visual muda ao redimensionar/abrir em tela cheia)
var resizeObserver = new ResizeObserver(function(){
  map.invalidateSize();
  repositionAllMiniCards();
  if(cardVisible && current >= 0) {
    positionCard(current);
    if(connectorSVG) updateConnectorLine(current);
  }
});
resizeObserver.observe(document.getElementById('map'));
window.addEventListener('resize', function(){ map.invalidateSize(); repositionAllMiniCards(); });

</script>
</body>
</html>
